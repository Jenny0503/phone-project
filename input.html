<!DOCTYPE html>
<html lang="zh-Hant"></html>
<head> 
    <meta charset="UTF-8">
<meta  name="viewpoint" content="width=device-width", initial -scale="1.0">
 <title>輸入頁面</title>
 <style>
    body{font-family: Arial, sans-serif; margin:20px}
 </style>
</head>
<body>
    <h1>手機使用習慣調查</h1>
    <p>請選擇答案</p>
    <form>
        <p>1. 你每天使用手機的時間？</p>
        <label><input type="radio" name="time" value="3小時以下"> 3小時以下</label><br>
        <label><input type="radio" name="time" value="3-5小時"> 3-5小時</label><br>
         <label><input type="radio" name="time" value="3-5小時"> 5-7小時</label><br>
        <label><input type="radio" name="time" value="7-10小時"> 7-10小時</label><br>
        <label><input type="radio" name="time" value="10小時以上"> 10小時以上</label><br>
        <p>2. 最常用手機做的事？</p>
        <label><input type="radio" name="use" value="社群媒體"> 社群媒體</label><br> 
        <label><input type="radio" name="use" value="觀看影片"> 觀看影片</label><br>
        <label><input type="radio" name="use" value="玩遊戲"> 玩遊戲</label><br>
        <label><input type="radio" name="use" value="聊天"> 聊天</label><br>
        <label><input type="radio" name="use" value="學習"> 學習</label><br>
         <p>3. 影響學習專心程度<br>
        1代表完全不影響,5代表影響非常大</p>
        <label><input type="radio" name="study" value="1"> 1</label><br> 
        <label><input type="radio" name="study" value="2"> 2</label><br> 
        <label><input type="radio" name="study" value="3"> 3</label><br> 
        <label><input type="radio" name="study" value="4"> 4</label><br> 
        <label><input type="radio" name="study" value="5"> 5</label><br> 
        <br>
        <button type="button" onclick="goResult()">送出</button>
        </form>
<script>
function goResult() {

    const time = document.querySelector('input[name="time"]:checked');
    const study = document.querySelector('input[name="study"]:checked');
    const use = document.querySelector('input[name="use"]:checked');

    if (!time || !study || !use) {
        alert("請選完三題");
        return;
    }

    const url = `result.html?time=${time.value}&study=${study.value}&use=${use.value}`;
    window.location.href = url;
}
</script>
</body>
</html>
